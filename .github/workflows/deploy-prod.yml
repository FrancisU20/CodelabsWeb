name: Deploy Production

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: production
  cancel-in-progress: false

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
  CLOUDFRONT_DISTRIBUTION_ID: ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}
  SITE_BUCKET_NAME: ${{ vars.SITE_BUCKET_NAME }}

jobs:
  deploy:
    name: Deploy static site
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.6
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Validate deployment configuration
        run: |
          test -n "${{ vars.AWS_ROLE_TO_ASSUME }}"
          test -n "$SITE_BUCKET_NAME"
          test -n "$CLOUDFRONT_DISTRIBUTION_ID"
          test -f out/index.html

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Upload immutable assets
        run: |
          if [ -d out/_next/static ]; then
            aws s3 sync out/_next/static "s3://$SITE_BUCKET_NAME/_next/static" \
              --delete \
              --cache-control "public,max-age=31536000,immutable"
          fi

      - name: Upload site
        run: |
          aws s3 sync out "s3://$SITE_BUCKET_NAME" \
            --delete \
            --exclude "_next/static/*" \
            --cache-control "public,max-age=300,must-revalidate"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "$CLOUDFRONT_DISTRIBUTION_ID" \
            --paths "/*"
